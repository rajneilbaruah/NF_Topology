# configs/s2_default.yaml
# ========================
# Default configuration for the S2 flow (RecursiveSphereFlow).
#
# Model: s2 = RecursiveSphereFlow
#   - Works in PHYSICAL (cos_theta, phi) coordinates
#   - Base distribution: UNIFORM ON S2  (cos_theta ~ U[-1,1], phi ~ U[0,2pi])
#   - cos_theta: free-parameter Cartesian RQS (no MLP)
#   - phi:       MLP-conditioned CIRCULAR RQS (d[0] == d[K], periodic)
#   - No 'bound' parameter -- spline domain is the physical range directly
#
# Usage:
#   python -m hep_nsf.main --config configs/s2_default.yaml --data eemumu_mup.json

mode: train
model: s2

# Data
val_frac: 0.2
seed: 42

# Model architecture
num_bins: 32
num_splines: 1       # increase to 2, 3, ... for more expressiveness
# Note: no 'bound' for s2 -- it works in physical coordinates directly
hidden_dim: 64
num_layers: 2
arch: mlp
activation: relu
dropout: 0.0

# Training
lr: 0.001
weight_decay: 0.0
batch_size: 8192
epochs: 10000
patience: 20
ema_alpha: 0.3
clip_grad: 5.0
use_plateau: true
plateau_factor: 0.5
plateau_patience: 10
use_cosine: false
cosine_t_max: 500
log_every: 10

# I/O
run_name: s2_flow
save_dir: checkpoints
output_dir: outputs

# Sampling / evaluation
num_samples: 10000
target_r: 500.0

# Device
device: auto
